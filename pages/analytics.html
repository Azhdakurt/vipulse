<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIPulse | Analytics</title>

    <!-- Favicon -->
<link rel="icon" type="image/png" href="../assets/images/favicon.png">

    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
    <main class="secondary-page">

        <a href="../index.html" class="back-link">← Back to Dashboard</a>

        <section class="analytics-container">

            <p class="eyebrow">Insights</p>
            <h1>VIP Analytics</h1>

           <div id="analytics-content">

    <section class="analytics-summary">

        <div class="analytics-card">
            <h3>Total Players</h3>
            <p id="analytics-total-players">0</p>
        </div>

        <div class="analytics-card">
            <h3>Eligible Bonuses</h3>
            <p id="analytics-bonus">0</p>
        </div>

        <div class="analytics-card">
            <h3>High Churn</h3>
            <p id="analytics-churn">0</p>
        </div>

        <div class="analytics-card">
            <h3>RG Reviews</h3>
            <p id="analytics-rg">0</p>
        </div>

    </section>

    <section class="analytics-breakdown">

        <div class="analytics-section">
            <h2>VIP Tier Distribution</h2>
            <div id="tier-breakdown"></div>
        </div>

        <div class="analytics-section">
            <h2>Player Behaviour Summary</h2>
            <div id="behaviour-breakdown"></div>
        </div>

    </section>

</div>
<p class="analytics-note">
    Insights are generated dynamically from saved player reviews.
</p>

<p class="analytics-update-note">
    Updated automatically when player reviews are added, edited or removed.
</p>
        </section>

    </main>

    <script src="../assets/js/app.js"></script>
</body>
</html>
